  /tattoos:
    get:
      summary: Devuelve una lista de tatuajes.
      description: Devuelve una lista de tatuajes en el showroom, permitiendo filtrar por estilo, cover up y si son a color.
      parameters:
        - name: style
          in: query
          required: false
          schema:
            type: string
          description: Filtra por estilo del tatuaje.
        - name: coverUp
          in: query
          required: false
          schema:
            type: boolean
          description: Filtra por si el tatuaje es un cover up.
        - name: color
          in: query
          required: false
          schema:
            type: boolean
          description: Filtra por si el tatuaje es a color o en blanco y negro.
          examples:
            empty:
              summary: Sin resultados
              value: [ ]
            sample:
              summary: Dos resultados
              value:
                - id: 1
                  clientId: 1
                  professionalName: David el Titi
                  professionalId: 1
                  tattooDate: '2025-03-10'
                  style: Blackwork
                  tattooDescription: Rosa negra en el antebrazo con detalles geométricos.
                  imageUrl: https://62rosastattoo.com/img/tattoos/rosanegra.jpg
                  sessions: 2
                  coverUp: false
                  color: false
                - id: 2
                  clientId: 2
                  professionalName: Sacapunk Tattoo
                  professionalId: 1
                  tattooDate: '2025-03-10'
                  style: Tradicional
                  tattooDescription: Rosa roja en el antebrazo con detalles geométricos.
                  imageUrl: https://62rosastattoo.com/img/tattoos/rosaroja.jpg
                  sessions: 2
                  coverUp: false
                  color: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TattooDto'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'

    post:
      summary: Crea un nuevo tatuaje.
      description: Registra un nuevo tatuaje en el showroom.
      requestBody:
        required: true
        content:
          application/json:
            schema:
