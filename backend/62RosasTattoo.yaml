openapi: 3.0.1
info:
  title: 62 Rosas Tattoo
  description: API del estudio de tatuajes 62 Rosas Tattoo.
  version: 1.0.0
servers:
  - url: 'https://localhost:8080'
paths:
  /clients:
    get:
      summary: Devuelve la lista de clientes.
      description: Devuelve la lista de clientes, permitiendo filtrar por nombre, apellidos y si acepta mostrar fotos.
      parameters:
        - name: clientName
          in: query
          required: false
          schema:
            type: string
          description: Filtra por nombre del cliente.
        - name: clientSurname
          in: query
          required: false
          schema:
            type: string
          description: Filtra por apellidos del cliente.
        - name: showPhoto
          in: query
          required: false
          schema:
            type: boolean
          description: Filtra por si el cliente acepta que se muestren sus tatuajes.
          examples:
            empty:
              summary: Sin resultados
              value: [ ]
            sample:
              summary: Dos resultados
              value:
                - id: 1
                  clientName: Andrea
                  clientSurname: Fernandez de la Rosa
                  email: andrea@example.com
                  phone: +34 601375656
                  birthDate: '1998-01-26'
                  showPhoto: true
                  visits: 3
                - id: 2
                  clientName: Alejandra
                  clientSurname: Perbech Royan
                  email: alejandra@example.com
                  phone: +34 601070809
                  birthDate: '1998-01-23'
                  showPhoto: true
                  visits: 3
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClientDto'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'

    post:
      summary: Crea un nuevo cliente.
      description: Registra un nuevo cliente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientInDto'
            examples:
              example1:
                summary: Ejemplo 1
                value:
                  clientName: Andrea
                  clientSurname: Fernandez de la Rosa
                  email: andrea@example.com
                  phone: +34 601375656
                  birthDate: '1998-01-26'
                  showPhoto: true
              example2:
                summary: Ejemplo 2
                value:
                  clientName: Alejandra
                  clientSurname: Perbech Royan
                  email: alejandra@example.com
                  phone: +34 601070809
                  birthDate: '1998-01-23'
                  showPhoto: true
      responses:
        '201':
          description: Cliente creado correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientDto'
        '400':
          description: Petición no válida.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'

  /clients/{id}:
    get:
      summary: Devuelve un cliente por su identificador.
      description: Devuelve la información de un cliente concreto.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
            format: int64
          description: Identificador único del cliente.
          examples:
            example1:
              summary: Ejemplo 1
              value:
                id: 1
                clientName: Andrea
                clientSurname: Fernandez de la Rosa
                email: andrea@example.com
                phone: +34 601375656
                birthDate: '1998-01-26'
                showPhoto: true
                visits: 3
            example2:
              summary: Ejemplo 2
              value:
                id: 2
                clientName: Alejandra
                clientSurname: Perbech Royan
                email: alejandra@example.com
                phone: +34 601070809
                birthDate: '1998-01-23'
                showPhoto: true
                visits: 3
      responses:
        '200':
          description: Cliente encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientDto'
        '404':
          description: Cliente no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'

    put:
      summary: Actualiza un cliente existente.
      description: Actualiza los datos de un cliente identificado por su ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
            format: int64
          description: Identificador único del cliente.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientInDto'
            examples:
              example1:
                summary: Ejemplo 1
                value:
                  clientName: Andrea modificado
                  clientSurname: Fernandez de la Rosa
                  email: andrea@example.com
                  phone: +34 601375656
                  birthDate: '1998-01-26'
                  showPhoto: true
              example2:
                summary: Ejemplo 2
                value:
                  clientName: Alejandra modificado
                  clientSurname: Perbech Royan
                  email: alejandra@example.com
                  phone: +34 601070809
                  birthDate: '1998-01-23'
                  showPhoto: true
      responses:
        '200':
          description: Cliente actualizado correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientDto'
        '400':
          description: Petición no válida.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
        '404':
          description: Cliente no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'

    delete:
      summary: Elimina un cliente existente.
      description: Elimina un cliente identificado por su ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
            format: int64
          description: Identificador único del cliente.
      responses:
        '204':
          description: Cliente eliminado correctamente.
        '404':
          description: Cliente no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'

  /professionals:
    get:
      summary: Devuelve una lista de profesionales.
      description: Devuelve una lista de profesionales, permitiendo filtrar por nombre artístico, agenda abierta y años de experiencia.
      parameters:
        - name: professionalName
          in: query
          required: false
          schema:
            type: string
          description: Filtra por nombre artístico del profesional.
        - name: booksOpened
          in: query
          required: false
          schema:
            type: boolean
          description: Filtra por si la agenda del profesional está abierta.
        - name: yearsExperience
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: Filtra por años de experiencia.
          examples:
            empty:
              summary: Sin resultados
              value: [ ]
            sample:
              summary: Dos resultados
              value:
                - id: 1
                  professionalName: David el Titi
                  birthDate: '1986-12-05'
                  description: Especialista en tatuaje neotradicional
                  profilePhoto: https://62rosastattoo.com/img/profesionales/davideltiti.jpg
                  booksOpened: true
                  yearsExperience: 15
                - id: 2
                  professionalName: Sacapunk Tattoo
                  birthDate: '1986-12-05'
                  description: Especialista en tatuaje tradicional
                  profilePhoto: https://62rosastattoo.com/img/profesionales/sacapunk.jpg
                  booksOpened: true
                  yearsExperience: 10
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProfessionalDto'
        '500':
          description: Internal server error
