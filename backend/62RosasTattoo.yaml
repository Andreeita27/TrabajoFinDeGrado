components:
  schemas:
    ClientInDto:
      type: object
      properties:
        clientName:
          type: string
          description: Nombre del cliente
        clientSurname:
          type: string
          description: Apellidos del cliente
        email:
          type: string
          format: email
          description: Email del cliente
        phone:
          type: string
          description: Teléfono del cliente
        birthDate:
          type: string
          format: date
          description: Fecha de nacimiento del cliente
        showPhoto:
          type: boolean
          description: Indica si acepta que se muestren sus tatuajes
      required:
        - clientName
        - clientSurname
        - email
      example:
        clientName: Andrea
        clientSurname: Fernandez de la Rosa
        email: andrea@example.com
        phone: "+34 601375656"
        birthDate: "1998-01-26"
        showPhoto: true

    ClientDto:
      allOf:
        - $ref: '#/components/schemas/ClientInDto'
      type: object
      properties:
        id:
          type: number
          format: int64
          description: Identificador único del cliente
        visits:
          type: number
          format: int64
          description: Número de visitas realizadas al estudio
      example:
        id: 1
        clientName: Andrea
        clientSurname: Fernandez de la Rosa
        email: andrea@example.com
        phone: "+34 601375656"
        birthDate: "1998-01-26"
        showPhoto: true
        visits: 3

    ErrorResponse:
      type: object
      properties:
        code:
          type: number
          format: int32
          description: Código de estado HTTP
        message:
          type: string
          description: Mensaje de error
        title:
          type: string
          description: Tipo de error

    InternalServerError:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
      example:
        code: 500
        message: Internal server error
        title: internal-server-error

    BadRequest:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
      example:
        code: 400
        message: Bad request
        title: bad-request

    ProfessionalInDto:
      type: object
      properties:
        professionalName:
          type: string
          description: Nombre artístico del profesional
        birthDate:
          type: string
          format: date
          description: Fecha de nacimiento del profesional
        description:
          type: string
          description: Descripción o biografía del profesional
        profilePhoto:
          type: string
          description: URL o ruta de la foto de perfil
        booksOpened:
          type: boolean
          description: Indica si la agenda está abierta para coger citas
        yearsExperience:
          type: number
          format: int64
          description: Años de experiencia del profesional
      required:
        - professionalName
        - description
      example:
        professionalName: "David el Titi"
        birthDate: "1986-12-05"
        description: "Especialista en tatuaje neotradicional."
        profilePhoto: "https://62rosastattoo.com/img/profesionales/davideltiti.jpg"
        booksOpened: true
        yearsExperience: 15

    ProfessionalDto:
      allOf:
        - $ref: '#/components/schemas/ProfessionalInDto'
      type: object
      properties:
        id:
          type: number
          format: int64
          description: Identificador único del profesional
      example:
        id: 1
        professionalName: "David el Titi"
        birthDate: "1986-12-05"
        description: "Especialista en tatuaje neotradicional"
        profilePhoto: "https://62rosastattoo.com/img/profesionales/davideltiti.jpg"
        booksOpened: true
        yearsExperience: 15

    AppointmentInDto:
      type: object
      properties:
        clientId:
          type: number
          format: int64
          description: Identificador único del cliente que reserva la cita
        professionalId:
          type: number
          format: int64
          description: Identificador único del profesional con el que se reserva la cita
        startDateTime:
          type: string
          format: date-time
          description: Fecha y hora de inicio de la cita
        bodyPlacement:
          type: string
          description: Parte del cuerpo donde se realizará el tatuaje
        ideaDescription:
          type: string
          description: Descripción de la idea del tatuaje
        firstTime:
          type: boolean
          description: Indica si es la primera visita del cliente al estudio
        tattooSize:
          type: string
          description: Tamaño aproximado del tatuaje
          enum:
            - SMALL
            - MEDIUM
            - LARGE
            - XL
        referenceImageUrl:
          type: string
          description: URL de una imagen de referencia opcional
      required:
        - clientId
        - professionalId
        - startDateTime
        - bodyPlacement
        - ideaDescription
      example:
        clientId: 1
        professionalId: 1
        startDateTime: "2025-02-15T16:00:00"
        bodyPlacement: "Muñeca"
        ideaDescription: "Nombre Manuel con letra fina y cursiva."
        firstTime: true
        tattooSize: "SMALL"
        referenceImageUrl: "https://www.ejemplo.com/manuel.jpg"

    AppointmentDto:
      allOf:
        - $ref: '#/components/schemas/AppointmentInDto'
      type: object
      properties:
        id:
          type: number
          format: int64
          description: Identificador único de la cita
        professionalName:
          type: string
          description: Nombre del profesional con el que se reserva la cita
        durationMinutes:
          type: number
          format: int32
          description: Duración de la cita en minutos
        price:
          type: number
          format: float
          description: Precio de la cita en euros
        appointmentState:
          type: string
          description: Estado actual de la cita
          enum:
            - PENDING
            - CONFIRMED
            - CANCELLED
            - COMPLETED
            - NO_SHOW
        depositPaid:
          type: boolean
          description: Indica si el cliente ha pagado la señal de 50€
      example:
        id: 1
        clientId: 1
        professionalId: 1
        professionalName: "David el Titi"
        startDateTime: "2025-02-15T16:00:00"
        bodyPlacement: "Muñeca"
        ideaDescription: "Nombre Manuel con letra fina y cursiva."
        firstTime: true
        tattooSize: "SMALL"
        referenceImageUrl: "https://www.ejemplo.com/manuel.jpg"
        durationMinutes: 60
        price: 80.0
        appointmentState: "CONFIRMED"
        depositPaid: true

    TattooInDto:
      type: object
      properties:
        clientId:
          type: number
          format: int64
          description: Identificador interno del cliente
        professionalId:
          type: number
          format: int64
          description: Identificador único del profesional que realizó el tatuaje
        tattooDate:
          type: string
          format: date
          description: Fecha en la que se realizó el tatuaje
        style:
          type: string
          description: Estilo del tatuaje (blackwork, fine line, realismo, etc.)
        tattooDescription:
          type: string
          description: Descripción del tatuaje
        imageUrl:
          type: string
          description: URL o ruta de la imagen del tatuaje
        sessions:
          type: number
          format: int32
          description: Número de sesiones necesarias para completar el tatuaje
        coverUp:
          type: boolean
          description: Indica si el tatuaje es un cover up de otro tatuaje anterior
        color:
          type: boolean
          description: Indica si el tatuaje es a color o en blanco y negro
      required:
        - clientId
        - professionalId
        - tattooDate
        - style
        - tattooDescription
        - imageUrl
      example:
        clientId: 1
        professionalId: 1
        tattooDate: "2025-03-10"
        style: "Blackwork"
        tattooDescription: "Rosa negra en el antebrazo con detalles geométricos."
        imageUrl: "https://62rosastattoo.com/img/tattoos/rosa-negra-antebrazo.jpg"
        sessions: 2
        coverUp: false
        color: false

    TattooDto:
      allOf:
        - $ref: '#/components/schemas/TattooInDto'
      type: object
      properties:
        id:
          type: number
          format: int64
          description: Identificador único del tatuaje realizado
        professionalName:
          type: string
          description: Nombre del profesional que realizó el tatuaje
      example:
        id: 1
        clientId: 1
        professionalName: "David el Titi"
        professionalId: 1
        tattooDate: "2025-03-10"
        style: "Blackwork"
        tattooDescription: "Rosa negra en el antebrazo con detalles geométricos."
        imageUrl: "https://62rosastattoo.com/img/tattoos/rosa-negra-antebrazo.jpg"
        sessions: 2
        coverUp: false
        color: false

    ReviewInDto:
      type: object
      properties:
        appointmentId:
          type: number
          format: int64
          description: Identificador de la cita que se está valorando
        rating:
          type: number
          format: int32
          minimum: 1
          maximum: 5
          description: Puntuación de la reseña
        comment:
          type: string
          description: Comentario del cliente sobre la experiencia
        wouldRecommend:
          type: boolean
          description: Indica si el cliente recomendaría el estudio o al profesional
      required:
        - appointmentId
        - comment
      example:
        appointmentId: 1
        rating: 5
        comment: "Experiencia genial, el trato ha sido increíble y el tatuaje ha quedado perfecto."
        wouldRecommend: true

    ReviewDto:
      allOf:
        - $ref: '#/components/schemas/ReviewInDto'
      type: object
      properties:
        id:
          type: number
          format: int64
          description: Identificador único de la reseña
        clientId:
          type: number
          format: int64
          description: Identificador único del cliente que ha dejado la reseña
        professionalId:
          type: number
          format: int64
          description: Identificador del profesional relacionado con la reseña
        createdAt:
          type: string
          format: date-time
          description: Fecha y hora en la que se creó la reseña
      example:
        id: 1
        appointmentId: 1
        clientId: 1
        professionalId: 1
        rating: 5
        comment: "Experiencia genial, el trato ha sido increíble y el tatuaje ha quedado perfecto."
        wouldRecommend: true
        createdAt: "2025-03-12T19:45:00"