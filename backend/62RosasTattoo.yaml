  /appointments:
    get:
      summary: Devuelve una lista de citas.
      description: Devuelve una lista de citas, permitiendo filtrar por estado, cliente y profesional.
      parameters:
        - name: state
          in: query
          required: false
          schema:
            type: string
            enum:
              - PENDING
              - CONFIRMED
              - CANCELLED
              - COMPLETED
              - NO_SHOW
          description: Filtra por el estado actual de la cita.
        - name: clientId
          in: query
          required: false
          schema:
            type: number
            format: int64
          description: Filtra por identificador del cliente.
        - name: professionalId
          in: query
          required: false
          schema:
            type: number
            format: int64
          description: Filtra por identificador del profesional.
          examples:
            empty:
              summary: Sin resultados
              value: [ ]
            sample:
              summary: Dos resultados
              value:
                - id: 1
                  clientId: 1
                  professionalId: 1
                  professionalName: David el Titi
                  startDateTime: '2025-02-15T16:00:00'
                  bodyPlacement: Muñeca
                  ideaDescription: Nombre Alejandra con letra fina y cursiva.
                  firstTime: true
                  tattooSize: SMALL
                  referenceImageUrl: https://www.ejemplo.com/alejandra.jpg
                  durationMinutes: 60
                  price: 80.0
                  appointmentState: CONFIRMED
                  depositPaid: true
                - id: 2
                  clientId: 2
                  professionalId: 2
                  professionalName: Sacapunk Tattoo
                  startDateTime: '2025-02-15T16:00:00'
                  bodyPlacement: Muñeca
                  ideaDescription: Nombre Andrea con letra fina y cursiva.
                  firstTime: true
                  tattooSize: SMALL
                  referenceImageUrl: https://www.ejemplo.com/andrea.jpg
                  durationMinutes: 60
                  price: 80.0
                  appointmentState: CONFIRMED
                  depositPaid: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AppointmentDto'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'

    post:
      summary: Crea una nueva cita.
      description: Registra una nueva cita en el sistema.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentInDto'
            examples:
              example1:
                summary: Ejemplo 1
                value:
                  clientId: 1
                  professionalId: 1
                  startDateTime: '2025-02-15T16:00:00'
                  bodyPlacement: Muñeca
                  ideaDescription: Nombre Alejandra con letra fina y cursiva.
                  firstTime: true
                  tattooSize: SMALL
                  referenceImageUrl: https://www.ejemplo.com/alejandra.jpg
              example2:
                summary: Ejemplo 2
                value:
                  clientId: 2
                  professionalId: 2
                  startDateTime: '2025-02-15T16:00:00'
                  bodyPlacement: Muñeca
                  ideaDescription: Nombre Andrea con letra fina y cursiva.
                  firstTime: true
                  tattooSize: SMALL
                  referenceImageUrl: https://www.ejemplo.com/andrea.jpg
      responses:
        '201':
          description: Cita creada correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentDto'
        '400':
          description: Petición no válida.
          content:
