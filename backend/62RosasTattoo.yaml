                  imageUrl: https://62rosastattoo.com/img/tattoos/rosanegra.jpg
                  sessions: 2
                  coverUp: false
                  color: false
              ejemplo2:
                summary: Ejemplo 2
                value:
                  clientId: 2
                  professionalId: 2
                  tattooDate: '2025-03-10'
                  style: Tradicional
                  tattooDescription: Rosa roja en el antebrazo con detalles geométricos.
                  imageUrl: https://62rosastattoo.com/img/tattoos/rosaroja.jpg
                  sessions: 2
                  coverUp: false
                  color: false
      responses:
        '201':
          description: Tatuaje creado correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TattooDto'
        '400':
          description: Petición no válida.
